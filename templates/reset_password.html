{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — JANSEVA AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --emerald: #10b981;
    --black-bg: #0a0a0a;
    --text-white: #ffffff;
    --text-gray: #a1a1aa;
    --border-dark: #27272a;
  }
  body { 
    min-height: 100vh; font-family: 'Inter', sans-serif;
    background-color: var(--black-bg); color: var(--text-white);
    display: flex; align-items: center; justify-content: center; padding: 2rem;
  }
  .reset-box {
    background: #ffffff; border-radius: 24px; padding: 3rem;
    width: 100%; max-width: 440px; color: #0f172a;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }
  .title { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
  .desc { font-size: 1rem; color: #64748b; margin-bottom: 2rem; }
  
  .field { margin-bottom: 1.5rem; }
  label { display: block; font-size: 0.9rem; font-weight: 600; color: #334155; margin-bottom: 0.5rem; }
  input[type="password"] {
    width: 100%; padding: 0.875rem 1rem;
    font-family: inherit; font-size: 1rem; color: #0f172a;
    background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 12px;
    outline: none; transition: all 0.2s ease;
  }
  input:focus { border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); background: #fff;}
  input.bad { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15); }
  
  .ferr { font-size: 0.85rem; color: #ef4444; margin-top: 0.5rem; display: none; font-weight: 500; }
  .ferr.show { display: block; }
  
  .btn-submit {
    width: 100%; margin-top: 0.5rem; padding: 1rem;
    background: #000; border: none; border-radius: 12px;
    color: #fff; font-size: 1.05rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s ease;
  }
  .btn-submit:hover { background: #18181b; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15); }
  
  .toast { display: none; margin-top: 1.5rem; padding: 1rem; border-radius: 8px; font-size: 0.95rem; font-weight: 600; }
  .toast.ok { background: #ecfdf5; color: #065f46; display: block; border: 1px solid #10b981; }
  .toast.err { background: #fef2f2; color: #991b1b; display: block; border: 1px solid #ef4444; }
  
  .nav-back { text-align: center; margin-top: 1.5rem; }
  .nav-back a { color: #64748b; font-size: 0.9rem; font-weight: 600; text-decoration: none; }
  .nav-back a:hover { color: #0f172a; }
  
  /* Danger wrapper for invalid tokens */
  .invalid-box { text-align: center; }
  .invalid-box svg { width: 64px; height: 64px; color: #ef4444; margin-bottom: 1rem; }
  .invalid-box h2 { font-size: 1.5rem; color: #ef4444; margin-bottom: 1rem; }
  .invalid-box p { color: #64748b; margin-bottom: 2rem; }
  .invalid-box a { display: inline-block; padding: 0.75rem 1.5rem; background: #000; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; }
</style>
</head>
<body>

<div class="reset-box">
  {% if error %}
    <div class="invalid-box">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
      <h2>Link Expired</h2>
      <p>{{ error }}</p>
      <a href="/">Return to Login</a>
    </div>
  {% else %}
    <div class="title">New Password</div>
    <div class="desc">Create a new secure password for {{ email }}</div>
    
    <form id="reset-form" onsubmit="doReset(event)" novalidate>
      <input type="hidden" id="token" value="{{ token }}">
      
      <div class="field">
        <label for="p1">New Password</label>
        <input type="password" id="p1" placeholder="Min. 8 characters">
        <div class="ferr" id="p1-e">Password must be at least 8 characters.</div>
      </div>
      
      <div class="field">
        <label for="p2">Confirm Password</label>
        <input type="password" id="p2" placeholder="Confirm your password">
        <div class="ferr" id="p2-e">Passwords do not match.</div>
      </div>
      
      <button type="submit" class="btn-submit" id="btn-save">Save Password</button>
      <div class="toast" id="rt"></div>
      
      <div class="nav-back"><a href="/">Back to Login</a></div>
    </form>
  {% endif %}
</div>

<script>
  function getCSRF() {
    return document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
  }
  
  function doReset(e) {
    if(e) e.preventDefault();
    
    const p1 = document.getElementById('p1').value;
    const p2 = document.getElementById('p2').value;
    const token = document.getElementById('token').value;
    
    const err1 = document.getElementById('p1-e');
    const err2 = document.getElementById('p2-e');
    let bad = false;
    
    if (p1.length < 8) { err1.classList.add('show'); bad = true; } else { err1.classList.remove('show'); }
    if (p1 !== p2 || !p2) { err2.classList.add('show'); bad = true; } else { err2.classList.remove('show'); }
    
    if(bad) return;
    
    const btn = document.getElementById('btn-save');
    btn.innerText = 'Saving...'; btn.disabled = true;
    
    fetch('/api/auth/reset-password/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() },
      body: JSON.stringify({ token: token, new_password: p1 })
    })
    .then(r => r.json())
    .then(data => {
      btn.innerText = 'Save Password'; btn.disabled = false;
      const tst = document.getElementById('rt');
      if (data.success) {
        tst.className = 'toast ok'; tst.innerText = '✓ Password changed successfully! You can now log in.';
        setTimeout(() => window.location.href = '/', 2500);
      } else {
        tst.className = 'toast err'; tst.innerText = '✗ ' + (data.error || 'Failed to reset password.');
      }
    })
    .catch(() => {
      btn.innerText = 'Save Password'; btn.disabled = false;
      const tst = document.getElementById('rt');
      tst.className = 'toast err'; tst.innerText = '✗ Cannot reach server.';
    });
  }
</script>
</body>
</html>
